name: Hourly Backtest

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Legacy single symbol (used when symbols is blank)"
        required: false
        default: "AAPL"
      symbols:
        description: "Comma-separated symbols to backtest independently"
        required: false
        default: ""
      publish_to_database:
        description: "Publish result to Database_Agent"
        required: false
        default: "true"
      start:
        description: "Historical data start (ISO-8601)"
        required: false
        default: ""
      end:
        description: "Historical data end (ISO-8601); blank uses current UTC time"
        required: false
        default: ""

permissions:
  contents: read

env:
  BACKTEST_ACCOUNT_ID: ${{ vars.BACKTEST_ACCOUNT_ID || '1' }}
  BACKTEST_SYMBOL: ${{ github.event.inputs.symbol || vars.BACKTEST_SYMBOL || 'AAPL' }}
  BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols || vars.BACKTEST_SYMBOLS || github.event.inputs.symbol || vars.BACKTEST_SYMBOL || 'AAPL' }}
  BACKTEST_MAX_SYMBOLS: ${{ vars.BACKTEST_MAX_SYMBOLS || '10' }}
  BACKTEST_SKILL_ID: ${{ vars.BACKTEST_SKILL_ID || 'hourly-sma-crossover' }}
  BACKTEST_STRATEGY_ID: ${{ vars.BACKTEST_STRATEGY_ID || 'hourly-sma-crossover' }}
  BACKTEST_TIMEFRAME: ${{ vars.BACKTEST_TIMEFRAME || '1d' }}
  BACKTEST_START: ${{ github.event.inputs.start || vars.BACKTEST_START || '' }}
  BACKTEST_END: ${{ github.event.inputs.end || vars.BACKTEST_END || '' }}
  BACKTEST_MINIMUM_BARS: ${{ vars.BACKTEST_MINIMUM_BARS || '252' }}
  BACKTEST_BAR_LIMIT: ${{ vars.BACKTEST_BAR_LIMIT || '10000' }}
  BACKTEST_INITIAL_EQUITY: ${{ vars.BACKTEST_INITIAL_EQUITY || '100000' }}
  BACKTEST_STRATEGY: ${{ vars.BACKTEST_STRATEGY || 'sma_crossover' }}
  BACKTEST_FAST_WINDOW: ${{ vars.BACKTEST_FAST_WINDOW || '2' }}
  BACKTEST_SLOW_WINDOW: ${{ vars.BACKTEST_SLOW_WINDOW || '3' }}
  BACKTEST_FEE_BPS: ${{ vars.BACKTEST_FEE_BPS || '0' }}
  BACKTEST_SLIPPAGE_BPS: ${{ vars.BACKTEST_SLIPPAGE_BPS || '0' }}
  PUBLISH_TO_DATABASE: ${{ github.event.inputs.publish_to_database || vars.PUBLISH_TO_DATABASE || 'true' }}
  DATABASE_AGENT_URL: ${{ secrets.DATABASE_AGENT_URL }}
  DATABASE_AGENT_API_KEY: ${{ secrets.DATABASE_AGENT_API_KEY }}
  ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_DATA_API_URL: ${{ vars.ALPACA_DATA_API_URL || 'https://data.alpaca.markets' }}
  ALPACA_DATA_FEED: ${{ vars.ALPACA_DATA_FEED || 'iex' }}

jobs:
  hourly-backtest:
    name: Run hourly backtest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: hourly-backtest-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests first
        run: python -m pytest -q

      - name: Run hourly backtest
        run: python scripts/run_hourly_backtest.py

      - name: Upload backtest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hourly-backtest-report
          path: reports/
          if-no-files-found: warn
